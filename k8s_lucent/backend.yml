apiVersion: apps/v1
kind: Deployment
metadata:
  name: lucent-backend-pod
  labels:
    app: backend-pod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-pod
  template:
    metadata:
      labels:
        app: backend-pod
    spec:
      containers:
      - name: lucent-backend
        image: sohampatil08/lucent-k8s-backend
        ports:
        - containerPort: 5000
          protocol: TCP