#Expose this on NodePort
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lucent-app
  labels:
    app: lucent-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lucent-app
  template:
    metadata:
      labels:
        app: lucent-app
    spec:
      containers:
      - name: lucent-backend
        image: sohampatil08/lucent-k8s-backend
        ports:
        - containerPort: 5000

      - name: lucent-frontend
        image: sohampatil08/lucent-k8s-frontend
        ports:
        - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: lucent-backend-service
spec:
  type: NodePort
  selector:
    app: lucent-app
  ports:
    - name: frontend
      port: 80
      targetPort: 5173
      nodePort: 30080
    - name: backend
      port: 5000
      targetPort: 5000
      nodePort: 30500